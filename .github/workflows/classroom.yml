name: G0301 — Layout Managers y Bordes — Autograding

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  # ── Job 1: Compilar y correr todos los tests ───────────────────
  build-and-test:
    name: Compilar y Evaluar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Instalar display virtual (Swing requiere Xvfb en CI)
        run: sudo apt-get install -y xvfb

      - name: Compilar clases principales y de test
        run: mvn -q compile test-compile -e

      - name: Ejecutar tests con display virtual
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          mvn test \
            -Djava.awt.headless=true \
            -Dsurefire.rerunFailingTestsCount=1 \
            -e
        env:
          DISPLAY: ':99'

      - name: Publicar reporte de tests en Actions
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          check_name: 'Resultados Tests G0301'
          fail_on_failure: false

  # ── Job 2: Verificar Fat JAR ────────────────────────────────────
  fat-jar:
    name: Verificar Fat JAR ejecutable
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Generar Fat JAR
        run: mvn -q clean package -DskipTests

      - name: Verificar que el JAR existe y tiene Main-Class correcta
        run: |
          JAR=$(ls target/*-fat.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "❌ Fat JAR no encontrado en target/. Ejecuta: mvn clean package"
            exit 1
          fi
          echo "✅ Fat JAR: $JAR ($(du -h "$JAR" | cut -f1))"

          MAIN=$(unzip -p "$JAR" META-INF/MANIFEST.MF \
                 | grep "Main-Class" | tr -d '\r' | awk '{print $2}')
          EXPECTED="sv.edu.ues.ape115.layouts.app.Main"

          if [ "$MAIN" = "$EXPECTED" ]; then
            echo "✅ Main-Class correcta: $MAIN"
          else
            echo "❌ Main-Class incorrecta. Encontrada: '$MAIN'"
            echo "   Esperada:              '$EXPECTED'"
            exit 1
          fi

  # ── Job 3: Calificación automática GitHub Classroom ────────────
  autograding:
    name: Calificación Automática
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: sudo apt-get install -y xvfb

      - name: Compilar todo
        run: mvn -q compile test-compile

      - name: Ejecutar tests para autograding
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          mvn test -Djava.awt.headless=true || true
        env:
          DISPLAY: ':99'
        continue-on-error: true

      - name: Mostrar resumen de puntos
        if: always()
        run: |
          echo "════════════════════════════════════════════════════"
          echo "     CALIFICACIÓN G0301 — Layout Managers y Bordes"
          echo "════════════════════════════════════════════════════"
          if ls target/surefire-reports/*.txt 2>/dev/null | head -1; then
            cat target/surefire-reports/*.txt \
              | grep -E "Tests run:|PASS|FAIL|ERROR|pts" || true
          fi
          echo "Revisa los detalles en la pestaña Actions → Tests."
          echo "════════════════════════════════════════════════════"

      - name: GitHub Classroom Grading Action
        uses: education/autograding@v1
        continue-on-error: true
